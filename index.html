<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#FAFAF8">
  <title>HandWrite AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header>
      <h1>HandWrite AI</h1>
      <p>Customize and generate realistic handwriting.</p>
    </header>

    <!-- Controls -->
    <section>
      <textarea id="text-input" placeholder="Enter text here" maxlength="50"></textarea>
      <label for="speed-slider">Speed</label>
      <input type="range" id="speed-slider" min="0.6" max="9.5" value="2.5" step="0.1">
      <label for="bias-slider">Neatness</label>
      <input type="range" id="bias-slider" min="0.15" max="2.5" value="0.8" step="0.02">
      <label for="width-slider">Stroke Width</label>
      <input type="range" id="width-slider" min="0.1" max="1.5" value="0.75" step="0.02">

      <select id="select-style">
        <option value="-">Random Style</option>
        <option value="0">Style 1</option>
        <option value="1">Style 2</option>
        <option value="2">Style 3</option>
        <option value="3">Style 4</option>
        <option value="4">Style 5</option>
        <option value="5">Style 6</option>
      </select>

      <button id="draw-button" disabled>Loading...</button>
    </section>

    <!-- SVG Display -->
    <div id="canvas-container">
      <svg id="canvas"></svg>
    </div>
  </div>

  <script src="rnn.js"></script>
  <script src="app.js"></script>
</body>
</html>
