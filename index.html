<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FAFAF8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="HandWrite">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500&family=Caveat:wght@400;700&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
  <link rel="preload" href="https://fonts.gstatic.com/s/caveat/v23/WnznHAc5bAfYB2QRah7pcpNvOx-pjfJ9SII.ttf" as="font" type="font/ttf" crossorigin>
  <title>HandWrite AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <noscript>
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;color:#1A1A1A;background:#FAFAF8;padding:2em;text-align:center;">
      <div>
        <h1 style="font-size:1.5em;margin-bottom:0.5em;">HandWrite AI</h1>
        <p>JavaScript is required for this app. Please enable JavaScript and reload.</p>
      </div>
    </div>
  </noscript>

  <!-- Welcome Animation Overlay -->
  <div id="welcome-overlay">
    <svg id="welcome-svg" viewBox="0 0 440 90" xmlns="http://www.w3.org/2000/svg">
      <!-- Path elements injected by JS based on random style -->
    </svg>
  </div>

  <!-- Main App -->
  <div id="app">

    <!-- Section 1: Welcome Signature (sticky) -->
    <header id="signature-header">
      <svg id="header-svg" viewBox="0 0 220 45" xmlns="http://www.w3.org/2000/svg">
        <!-- Path elements injected by JS -->
      </svg>
    </header>

    <main>
      <!-- Section 2: Text Input -->
      <section class="section" id="input-section">
        <div class="textarea-wrapper">
          <textarea id="user-text" placeholder="Type what you want to write..." maxlength="200"></textarea>
          <span class="char-count" id="char-count">0/200</span>
        </div>
      </section>

      <!-- Section 3: Style Picker -->
      <section class="section" id="style-section">
        <h2 class="section-title">Style</h2>
        <div class="style-picker" id="style-picker">
          <!-- Generated by JS -->
        </div>
      </section>

      <!-- Section 4: Sliders -->
      <section class="section" id="sliders-section">
        <div class="sliders-row">
          <div class="slider-group">
            <label class="slider-label"><span class="slider-icon">&#9998;</span> Speed</label>
            <input type="range" id="slider-speed" min="0.5" max="2" step="0.1" value="1">
            <span class="slider-value" id="val-speed">1.0</span>
          </div>
          <div class="slider-group">
            <label class="slider-label"><span class="slider-icon">&#10023;</span> Neatness</label>
            <input type="range" id="slider-neatness" min="0.1" max="1" step="0.05" value="0.7">
            <span class="slider-value" id="val-neatness">0.7</span>
          </div>
          <div class="slider-group">
            <label class="slider-label"><span class="slider-icon">&#9679;</span> Thickness</label>
            <input type="range" id="slider-thickness" min="1" max="5" step="0.5" value="2">
            <span class="slider-value" id="val-thickness">2.0</span>
          </div>
        </div>
      </section>

      <!-- Section 5: Paper Style -->
      <section class="section" id="paper-section">
        <h2 class="section-title">Paper</h2>
        <div class="paper-picker">
          <button class="paper-btn active" data-paper="blank">
            <svg viewBox="0 0 32 32" width="28" height="28"><rect x="2" y="2" width="28" height="28" rx="2" fill="none" stroke="#888" stroke-width="1.5"/></svg>
            <span>Blank</span>
          </button>
          <button class="paper-btn" data-paper="lined">
            <svg viewBox="0 0 32 32" width="28" height="28"><rect x="2" y="2" width="28" height="28" rx="2" fill="none" stroke="#888" stroke-width="1.5"/><line x1="5" y1="10" x2="27" y2="10" stroke="#bbb" stroke-width="0.8"/><line x1="5" y1="17" x2="27" y2="17" stroke="#bbb" stroke-width="0.8"/><line x1="5" y1="24" x2="27" y2="24" stroke="#bbb" stroke-width="0.8"/></svg>
            <span>Lined</span>
          </button>
          <button class="paper-btn" data-paper="grid">
            <svg viewBox="0 0 32 32" width="28" height="28"><rect x="2" y="2" width="28" height="28" rx="2" fill="none" stroke="#888" stroke-width="1.5"/><line x1="12" y1="2" x2="12" y2="30" stroke="#bbb" stroke-width="0.5"/><line x1="22" y1="2" x2="22" y2="30" stroke="#bbb" stroke-width="0.5"/><line x1="2" y1="12" x2="30" y2="12" stroke="#bbb" stroke-width="0.5"/><line x1="2" y1="22" x2="30" y2="22" stroke="#bbb" stroke-width="0.5"/></svg>
            <span>Grid</span>
          </button>
          <button class="paper-btn" data-paper="dotted">
            <svg viewBox="0 0 32 32" width="28" height="28"><rect x="2" y="2" width="28" height="28" rx="2" fill="none" stroke="#888" stroke-width="1.5"/><circle cx="12" cy="12" r="1" fill="#bbb"/><circle cx="22" cy="12" r="1" fill="#bbb"/><circle cx="12" cy="22" r="1" fill="#bbb"/><circle cx="22" cy="22" r="1" fill="#bbb"/></svg>
            <span>Dotted</span>
          </button>
        </div>
      </section>

      <!-- Section 6: Generate + Preview -->
      <section class="section" id="generate-section">
        <button id="generate-btn" class="generate-btn">Generate</button>
        <div id="preview-area" class="preview-area">
          <div id="paper-bg" class="paper-bg paper-blank">
            <svg id="preview-svg" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg"></svg>
          </div>
          <div class="preview-actions" id="preview-actions" style="display:none;">
            <button class="action-btn" id="save-btn">Save</button>
            <button class="action-btn" id="share-btn">Share</button>
          </div>
        </div>
      </section>
    </main>

    <!-- Section 7: Footer -->
    <footer id="app-footer">
      <p class="footer-brand">HandWrite AI</p>
      <div class="footer-links">
        <a href="#" onclick="return false">Privacy</a>
        <a href="#" onclick="return false">Terms</a>
      </div>
    </footer>

  </div>

  <!-- opentype.js for glyph path extraction -->
  <script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
  <script src="script.js"></script>
  <!-- Safety: force-show app if JS welcome animation fails -->
  <script>
    window._welcomeDone = false;
    setTimeout(function() {
      if (window._welcomeDone) return;
      console.warn('[HandWrite] Safety timeout: forcing app visible');
      var overlay = document.getElementById('welcome-overlay');
      var app = document.getElementById('app');
      var header = document.getElementById('signature-header');
      if (overlay) { overlay.style.transition = 'opacity 0.3s ease'; overlay.style.opacity = '0'; setTimeout(function() { overlay.style.display = 'none'; }, 350); }
      if (app) app.classList.add('visible');
      if (header) header.classList.add('visible');
      window._welcomeDone = true;
    }, 4000);
  </script>
</body>
</html>
